name: CodeQL
# Static analysis (security & code quality) for Go.
# Runs weekly + on every push/PR to main. Results visible under
# Security → Code scanning alerts.

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 04:00 UTC — well before the dependabot 06:00 window.
    - cron: "0 4 * * 1"

jobs:
  analyze:
    if: ${{ !github.event.repository.private }}
    name: Analyze (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # default queries are sufficient for v1.0; add `security-extended`
          # later if needed.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
