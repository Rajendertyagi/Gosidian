name: Build Windows

on:
  workflow_dispatch:        # manual trigger
  push:                     # auto-build on push
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest   # build Win exe on Linux via cross-compile

    steps:
      - uses: actions/checkout@v4

      # 1. Build Vue 3 web UI
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          cd web
          npm install
          npm run build

      # 2. Build Go binary for Windows
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
          go build -ldflags="-s -w" -o gosidian.exe ./cmd/gosidian

      # 3. Upload as artifact
      - uses: actions/upload-artifact@v4
        with:
          name: gosidian-windows-amd64
          path: gosidian.exe
