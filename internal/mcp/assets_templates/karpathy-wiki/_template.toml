name = "karpathy-wiki"
description = "Full Karpathy-Wiki-Stack layout — one folder per role (memory, plans, skills, docs, agents). Best fit for long-lived projects with evolving ADRs, reusable skills and agent handoffs."

prompt = """
Use this template when the project will host a real body of work over
time: multiple plans, evolving ADRs in `memory/decisions.md`, reusable
skills, accumulated `log.md` entries. The scaffold creates empty index
READMEs for every standard role — agents are expected to populate them
incrementally as work materialises, never all at once.

The operating conventions (plan format + `Outcome`, ADR numbering,
skill structure, `hot.md` discipline, the closed tag vocabulary, ingest
rules) are NOT restated here — single source of truth. They are served
authoritatively by `memory_bootstrap` in the `directives_block` field,
fresh every session: read and follow that. This prompt only covers when
to pick this layout.
"""

[[variables]]
name = "PROJECT"
required = true

[[variables]]
name = "TODAY"
auto = "date"
