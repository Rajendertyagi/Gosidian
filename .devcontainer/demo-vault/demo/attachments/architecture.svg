<svg xmlns="http://www.w3.org/2000/svg" width="520" height="280" viewBox="0 0 520 280" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="520" height="280" rx="12" fill="#1e1e2e"/>
  <text x="260" y="34" fill="#cdd6f4" font-size="18" font-weight="700" text-anchor="middle">gosidian — one vault, three views</text>

  <!-- Vault -->
  <rect x="200" y="64" width="120" height="48" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="260" y="88" fill="#cdd6f4" font-size="14" font-weight="600" text-anchor="middle">Vault</text>
  <text x="260" y="104" fill="#a6adc8" font-size="11" text-anchor="middle">.md files</text>

  <!-- Index -->
  <rect x="200" y="140" width="120" height="44" rx="8" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
  <text x="260" y="162" fill="#cdd6f4" font-size="13" font-weight="600" text-anchor="middle">SQLite index</text>
  <text x="260" y="177" fill="#a6adc8" font-size="10" text-anchor="middle">FTS5 · graph · cache</text>

  <!-- Web UI -->
  <rect x="40" y="212" width="170" height="44" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
  <text x="125" y="234" fill="#cdd6f4" font-size="13" font-weight="600" text-anchor="middle">Web UI</text>
  <text x="125" y="249" fill="#a6adc8" font-size="10" text-anchor="middle">humans</text>

  <!-- MCP -->
  <rect x="310" y="212" width="170" height="44" rx="8" fill="#313244" stroke="#f38ba8" stroke-width="2"/>
  <text x="395" y="234" fill="#cdd6f4" font-size="13" font-weight="600" text-anchor="middle">MCP server</text>
  <text x="395" y="249" fill="#a6adc8" font-size="10" text-anchor="middle">agents</text>

  <!-- edges -->
  <g stroke="#6c7086" stroke-width="2" fill="none">
    <line x1="260" y1="112" x2="260" y2="140"/>
    <line x1="125" y1="212" x2="220" y2="184"/>
    <line x1="395" y1="212" x2="300" y2="184"/>
  </g>
</svg>
